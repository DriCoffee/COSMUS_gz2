# ============================================================
# ROS-GZ Bridge — COSMUS_gz2 — 5 aviões independentes
# Gazebo Jetty (Sim 10) + ROS 2 Rolling
# ============================================================

# Relógio da simulação
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS
  lazy: false

# ============================================================
# PLANE00

# IMU
- ros_topic_name: "/plane00/imu"
  gz_topic_name: "/model/plane00/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS
  lazy: false

# GPS / NavSat
- ros_topic_name: "/plane00/navsat"
  gz_topic_name: "/model/plane00/navsat"
  ros_type_name: "sensor_msgs/msg/NavSatFix"
  gz_type_name: "gz.msgs.NavSat"
  direction: GZ_TO_ROS
  lazy: false

# Odometria
- ros_topic_name: "/plane00/odometry"
  gz_topic_name: "/model/plane00/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS
  lazy: false

# TF / Pose
- ros_topic_name: "/tf"
  gz_topic_name: "/model/plane00/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
  lazy: false

# Throttle (velocidade do motor / hélice)
- ros_topic_name: "/plane00/cmd_throttle"
  gz_topic_name: "/model/plane00/joint/rotor_puller_joint/cmd_vel"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
  lazy: false

# Aileron esquerdo
- ros_topic_name: "/plane00/cmd_left_elevon"
  gz_topic_name: "/model/plane00/joint/left_elevon_joint/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
  lazy: false

# Aileron direito
- ros_topic_name: "/plane00/cmd_right_elevon"
  gz_topic_name: "/model/plane00/joint/right_elevon_joint/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
  lazy: false

# Elevator (profundor)
- ros_topic_name: "/plane00/cmd_elevator"
  gz_topic_name: "/model/plane00/joint/elevator_joint/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
  lazy: false

# Rudder (leme direcional)
- ros_topic_name: "/plane00/cmd_rudder"
  gz_topic_name: "/model/plane00/joint/rudder_joint/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
  lazy: false


